[theme]
base                = "dark"
primaryColor        = "#C8A96E"        # Warm gold — Star Rail's signature accent
backgroundColor     = "#0D0D14"        # Deep space black-blue
secondaryBackgroundColor = "#13131F"   # Slightly lifted dark for cards
textColor           = "#E8E4DA"        # Warm off-white, not harsh
font                = "monospace"      # Clean terminal feel; swap for "sans serif" if preferred

[server]
headless            = true
enableCORS          = false
